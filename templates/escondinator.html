<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/static/stylesheet.css">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Esteganografía</title>
        <link rel="icon" type="image/jpeg" href="/static/assets/favicons/placeholder.jpg"/>
    </head>

    <body>

        <header>
            <a href="/main"><b>Home</b></a>
            <a href="/escondinator"><b>Escondinator:Ocultar</b></a>
            <a href="/revelar"><b>Escondinator:Extraer</b></a>
        </header>
        <h1>ESCONDINATOR</h1>
        <div class="main-container layout">
            <div class="side hide-side">
            <h2>Ocultar mensaje</h2>
            <form action="/hide" method="post" enctype="multipart/form-data" id="hideForm" > <!--Para sebas, en action indicira que ruta de aplicación llamamos, acción que será post ya que el usuario envia la imágen, mensaje y contraseña hacia nuestra aplicación y luego el enctype permite que el usuario envie imágenes-->
                <div class="display-wrapper" id="hidebox">
                    <img id="soonsus" src="" class="preview-img">
                </div>
                <div class="input-group">
                    <input type="file" name="imagen" id="imagenInput" required>
                    <button type="button" class="btn-clear" onclick="quitarimgseleccionadahide()">
                        <img src="static/assets/images/pictograma-x_764382-13928.png" alt="Eliminar">
                    </button>
                </div>                
                <p id="TextCapacity"></p> <!--En este caso le pasaremos al usuario la variable max_chars desde el JS-->
                <textarea name="mensaje" id="mensajeInput" placeholder="Mensaje, no meta más de 100k carácteres ya que podria cargar los recursos del servidor, si necesita meter más utilice la opción de archivo"></textarea>
                <p id="TextRemaining"></p> <!--La cantidad de texto restante de texto disponible-->
                <p id="TextWritten"></p> <!--Cantidad de carácteres escritos-->
                <div class="input-group">
                    <input type="file" name="file_message" accept=".txt" id="messagefile"> <!--Aquí le permitiremos al usuario introducir archivos .txt-->
                    <button type="button" onclick="quitararchivoinput()" class="btn-clear"><img src="static\assets\images\pictograma-x_764382-13928.png" alt="" width="15" height="15"></button>                
                </div>
                <h3>Introduce la Contraseña aqui:</h3>
                <div class="sub extract-sub">
                    <input id="passwordEncode" type="password" name="password" placeholder="Contraseña (Opcional)" maxlength="250">
                    <button type="submit">Ocultar</button>
                </div>
                <p id="processingUnit"></p>
            </form>

            {% if hide_error %}
            <h3>Hide Error:</h3>
            <p>{{ hide_error }}</p>
            {% endif %}
            </div>
            </form>



            </div>
        </div>
        {% if mensaje_extraido %} 
            <h3 class="extracted_message">Mensaje Extraido:</h3> <!--Aquí se utiliza Jinja2 para pasarle la variable al html SOLAMENTE si esta no esta vacia, o sea, si el mensaje se ha extraido de verdad-->
            <p class="extracted_message">{{ mensaje_extraido }}</p>
        {% endif %}
        <footer>

        </footer>
    </body>

    <script src="/static/JS/JS_messageinfo.js">

    </script>
    
</html>
